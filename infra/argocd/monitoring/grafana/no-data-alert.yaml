---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: moonkinmetrics
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaAlertRuleGroup
metadata:
  name: moonkinmetrics-no-data
spec:
  folderRef: moonkinmetrics
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  interval: 5m
  rules:
    - uid: efk4mz17q1wcge
      title: moonkinmetrics-no-data
      condition: C
      data:
        - refId: A
          relativeTimeRange:
            from: 172800
            to: 0
          datasourceUid: prometheus
          model:
            datasource:
                type: prometheus
                uid: prometheus
            editorMode: code
            expr: absent_over_time(scan_requests_total[24h])
            instant: true
            intervalMs: 1000
            legendFormat: __auto
            maxDataPoints: 43200
            range: false
            refId: A
        - refId: C
          datasourceUid: __expr__
          model:
            conditions:
                - evaluator:
                    params:
                        - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: last
                  type: query
            datasource:
                type: __expr__
                uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            refId: C
            type: threshold
      noDataState: Alerting
      execErrState: Error
      for: 0s
      annotations: {}
      labels: {}
      isPaused: false
      notificationSettings:
        receiver: sns-email
